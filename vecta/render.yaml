# Render Blueprint — Vecta backend (API Gateway + Compliance AI + data stores)
# https://render.com/docs/blueprint-spec
#
# Deploy: Dashboard → New → Blueprint → connect repo → apply this file.
# After first deploy, paste secrets via Environment → Add from .env using:
#   env/render-api-gateway.env.example
#   env/render-compliance-ai.env.example
#
# pgvector: Render Postgres may not include pgvector. For roommate AI you may need Neon / Supabase / self-hosted PG — see docs/DEPLOY_VERCEL_RENDER.md

version: "1"

databases:
  - name: vecta-db
    databaseName: vecta_db
    user: vecta
    plan: basic-256mb
    region: oregon

services:
  - type: keyvalue
    name: vecta-redis
    plan: starter
    region: oregon
    maxmemoryPolicy: noeviction
    ipAllowList: []

  - type: web
    name: vecta-api-gateway
    env: node
    region: oregon
    plan: starter
    rootDir: vecta
    # --include=dev: ensure TypeScript/turbo exist if NODE_ENV=production during install
    buildCommand: npm ci --include=dev && npx turbo run build --filter=api-gateway...
    startCommand: cd apps/api-gateway && node dist/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: SERVICE_NAME
        value: vecta-api-gateway
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: vecta-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: vecta-redis
          type: keyvalue
          property: connectionString
      # Set in dashboard after compliance-ai is live: https://<vecta-compliance-ai>.onrender.com
      - key: COMPLIANCE_AI_URL
        sync: false
      # Comma-separated: https://your-app.vercel.app,https://yourdomain.com
      - key: ALLOWED_ORIGINS
        sync: false
      - key: VECTA_JWT_PRIVATE_KEY
        sync: false
      - key: VECTA_JWT_PUBLIC_KEY
        sync: false
      - key: VECTA_JWT_ISSUER
        value: vecta.io
      - key: VECTA_JWT_AUDIENCE
        value: vecta-platform
      - key: VECTA_FIELD_ENCRYPTION_KEY
        sync: false
      - key: VECTA_HMAC_SECRET
        sync: false
      - key: INTERNAL_SERVICE_SECRET
        sync: false

      # ── Vertical Fortress: provider defaults ─────────────────────────────
      - key: BANKING_PROVIDER
        value: vecta-ledger
      - key: BANKING_PROVIDER_FALLBACK
        value: unit
      - key: IDENTITY_PROVIDER
        value: vecta-id
      - key: IDENTITY_PROVIDER_FALLBACK
        value: didit
      - key: BANK_DATA_PROVIDER
        value: vecta-connect
      - key: BANK_DATA_PROVIDER_FALLBACK
        value: plaid
      - key: CREDIT_PROVIDER
        value: vecta-bridge
      - key: CREDIT_PROVIDER_FALLBACK
        value: nova
      - key: INSURANCE_PROVIDER
        value: vecta-mga
      - key: INSURANCE_PROVIDER_FALLBACK
        value: lemonade

      # ── Vecta Ledger / Column Bank ────────────────────────────────────────
      - key: COLUMN_BANK_API_KEY
        sync: false
      - key: COLUMN_BANK_API_URL
        value: https://api.column.com
      - key: CLEARBANK_API_KEY
        sync: false
      - key: VISA_BIN_PREFIX
        value: "453201"
      - key: CARD_ENCRYPTION_KEY
        sync: false
      - key: CVV_HMAC_SECRET
        sync: false
      - key: KYC_ENCRYPTION_KEY
        sync: false
      - key: SPONSOR_ROUTING
        value: "021000021"

      # ── Vecta Connect — Open Banking ──────────────────────────────────────
      - key: SETU_AA_CLIENT_ID
        sync: false
      - key: SETU_AA_CLIENT_SECRET
        sync: false
      - key: TRUELAYER_CLIENT_ID
        sync: false
      - key: TRUELAYER_CLIENT_SECRET
        sync: false
      - key: SALT_EDGE_APP_ID
        sync: false
      - key: SALT_EDGE_SECRET
        sync: false
      - key: CHASE_OAUTH_CLIENT_ID
        sync: false
      - key: BOFA_OAUTH_CLIENT_ID
        sync: false
      - key: WELLS_OAUTH_CLIENT_ID
        sync: false

      # ── Vecta Credit Bridge — Bureau licenses ─────────────────────────────
      - key: CIBIL_API_KEY
        sync: false
      - key: CIBIL_MEMBER_ID
        sync: false
      - key: BURO_DE_CREDITO_API_KEY
        sync: false
      - key: EXPERIAN_UK_API_KEY
        sync: false
      - key: EXPERIAN_UK_CLIENT_SECRET
        sync: false
      - key: EQUIFAX_CANADA_API_KEY
        sync: false
      - key: EQUIFAX_CANADA_CLIENT_ID
        sync: false

      # ── Vecta MGA — Boost Insurance ───────────────────────────────────────
      - key: BOOST_INSURANCE_API_KEY
        sync: false
      - key: BOOST_INSURANCE_API_URL
        value: https://api.boostinsurance.io
      - key: MGA_LICENSE_NUMBER
        sync: false

  - type: web
    name: vecta-compliance-ai
    env: python
    region: oregon
    plan: starter
    rootDir: vecta
    buildCommand: pip install -r apps/compliance-ai/requirements.txt
    startCommand: cd apps/compliance-ai && uvicorn src.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: vecta-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: vecta-redis
          type: keyvalue
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
